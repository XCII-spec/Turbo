<style>
*{

body{

}

h1{

color:#00bfff;
}

.speed{
font-size:90px;
font-weight:bold;
margin:20px 0;
color:#00ff88;
text-shadow:0 0 20px #00ff88;
}

.status{
font-size:25px;
margin-bottom:30px;
}

.buttons{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

button{

  body{

radial-gradient(circle at center,#202020,#050505);
font-family:Arial,sans-serif;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.dashboard{
width:1000px;
background:
linear-gradient(145deg,#1a1a1a,#0b0b0b);
border:3px solid #444;
border-radius:35px;
padding:40px;
box-shadow:
0 0 30px #ff000055,
0 0 80px #000 inset;
}

.speed{
font-size:120px;
font-weight:bold;
color:#ff2b2b;
text-shadow:
0 0 10px #ff0000,
0 0 30px #ff0000;
}

.status{
font-size:28px;
margin-top:15px;
color:#ffcc00;
}

button{
background:linear-gradient(#444,#111);
color:white;
border:2px solid #666;
padding:18px 35px;
font-size:20px;
border-radius:15px;
cursor:pointer;
box-shadow:0 0 15px rgba(255,255,255,.15);
}

button:hover{
transform:scale(1.08);
}b 

button:hover{
transform:scale(1.05);
}

.start{
background:#00ff88;
}

.horn{
background:#ffcc00;
}

.music{
background:#00bfff;
color:white;
}

.info{
margin-top:30px;
color:#aaa;
}
</style>
</head>
<body>

<div class="dashboard">

<h1>🚗 MESSIFY DRIVE X26</h1>

<div class="speed" id="speed">0</div>

<div class="status" id="status">
🔴 Moteur arrêté
</div>

<div class="buttons">

<button class="start" onclick="toggleEngine()">
⚡ Démarrer
</button>

<button class="horn" onclick="hornSound()">
📢 Klaxon
</button>

<button class="music" onclick="toggleMusic()">
🎵 Musique
</button>

</div>

<div class="info">
Appuie sur <b>ESPACE</b> pour démarrer le moteur.
</div>

</div>

<audio id="engine" loop>
<source src="moteur.mp3" type="audio/mpeg">
</audio>

<audio id="horn">
<source src="klaxon.mp3" type="audio/mpeg">
</audio>

<audio id="music" loop>
<source src="musique.mp3" type="audio/mpeg">
</audio>

<script>

let engineOn=false;
let musicOn=false;
let speed=0;
let interval;

const engine=document.getElementById("engine");
const horn=document.getElementById("horn");
const music=document.getElementById("music");

function toggleEngine(){

if(!engineOn){

engine.play();

engineOn=true;

document.getElementById("status").innerHTML=
"🟢 Moteur démarré";

interval=setInterval(()=>{
if(speed<120){
speed+=2;
document.getElementById("speed").innerHTML=speed+" km/h";
}
},100);

}
else{

engine.pause();
engine.currentTime=0;

engineOn=false;
speed=0;

clearInterval(interval);

document.getElementById("speed").innerHTML="0";
document.getElementById("status").innerHTML=
"🔴 Moteur arrêté";

}

}

function hornSound(){
horn.currentTime=0;
horn.play();
}

function toggleMusic(){

if(!musicOn){
music.play();
musicOn=true;
}
else{
music.pause();
musicOn=false;
}

}

document.addEventListener("keydown",(e)=>{
if(e.code==="Space"){
e.preventDefault();
toggleEngine();
}
});

</script>

</body>
</html>
